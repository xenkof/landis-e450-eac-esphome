esphome:
  name: landis-meter
  friendly_name: Landis+Gyr E450

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

# ============================================================
# REQUIRED: Fix for Cyprus E450 HDLC frame format
# Without this, all sensor values will read as zero.
# Remove this block once PR #16942 is merged into ESPHome:
# https://github.com/esphome/esphome/pull/16942
# ============================================================
external_components:
  - source: github://pr#16942
    components: [dlms_meter]
    refresh: 1s

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  fast_connect: true

api:
  encryption:
    key: !secret landis_api_encryption_key

ota:
  - platform: esphome

# ============================================================
# M-Bus UART Configuration
# Confirmed working for EAC Cyprus Landis+Gyr E450:
#   - Baud rate: 2400
#   - Parity: NONE
#   - Data bits: 8
#   - Stop bits: 1
#
# Physical wiring (M-Bus module → ESP32-C6 SuperMini):
#   VCC → 5V
#   GND → GND
#   TXD → GPIO17  (note: TX/RX swapped vs standard convention)
#   RXD → GPIO16
#
# If you get no data at all, swap GPIO16 and GPIO17.
# M-Bus terminals on the module are polarity-insensitive.
# ============================================================
uart:
  id: mbus_uart
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 2400
  rx_buffer_size: 2048
  data_bits: 8
  parity: NONE
  stop_bits: 1

dlms_meter:
  uart_id: mbus_uart

sensor:
  # ============================================================
  # RAW DLMS SENSORS
  # These read directly from the meter via OBIS codes.
  # Marked internal=true — they do not appear in Home Assistant.
  # Scaling is applied in the template sensors below.
  #
  # Scaling factors confirmed for EAC Cyprus Landis+Gyr E450:
  #   Energy:         raw Wh    × 0.001  → kWh
  #   Current:        raw mA    × 0.01   → A
  #   Power Factor:   raw ×1000 × 0.001  → dimensionless
  #   Reactive Power: raw mVAr  × 0.001  → VAr
  #   Power / Voltage / Frequency: no scaling needed
  #
  # NOTE: L2 and L3 sensors are only present in the meter's
  # push dataset on three phase installations. If your meter
  # does not broadcast these OBIS codes they will show Unknown.
  # ============================================================

  # --- Active Power ---
  - platform: dlms_meter
    obis_code: "1-0:1.7.0"       # Instantaneous active power import (all phases)
    id: raw_power_import
    internal: true

  - platform: dlms_meter
    obis_code: "1-0:2.7.0"       # Instantaneous active power export (all phases)
    id: raw_power_export
    internal: true

  # --- Active Energy Totals ---
  - platform: dlms_meter
    obis_code: "1-0:1.8.0"       # Cumulative energy import (raw in Wh)
    id: raw_energy_import
    internal: true

  - platform: dlms_meter
    obis_code: "1-0:2.8.0"       # Cumulative energy export (raw in Wh)
    id: raw_energy_export
    internal: true

  # --- Reactive Power ---
  - platform: dlms_meter
    obis_code: "1-0:3.7.0"       # Instantaneous reactive power import
    id: raw_reactive_import
    internal: true

  - platform: dlms_meter
    obis_code: "1-0:4.7.0"       # Instantaneous reactive power export
    id: raw_reactive_export
    internal: true

  # --- Reactive Energy Totals ---
  - platform: dlms_meter
    obis_code: "1-0:3.8.0"       # Cumulative reactive energy import (VArh)
    id: raw_reactive_energy_import
    internal: true

  - platform: dlms_meter
    obis_code: "1-0:4.8.0"       # Cumulative reactive energy export (VArh)
    id: raw_reactive_energy_export
    internal: true

  # --- Phase L1 (present on all installations) ---
  - platform: dlms_meter
    obis_code: "1-0:32.7.0"      # Voltage L1
    id: raw_voltage_l1
    internal: true

  - platform: dlms_meter
    obis_code: "1-0:31.7.0"      # Current L1 (raw in mA)
    id: raw_current_l1
    internal: true

  # --- Phase L2 (three phase only) ---
  - platform: dlms_meter
    obis_code: "1-0:52.7.0"      # Voltage L2
    id: raw_voltage_l2
    internal: true

  - platform: dlms_meter
    obis_code: "1-0:51.7.0"      # Current L2 (raw in mA)
    id: raw_current_l2
    internal: true

  # --- Phase L3 (three phase only) ---
  - platform: dlms_meter
    obis_code: "1-0:72.7.0"      # Voltage L3
    id: raw_voltage_l3
    internal: true

  - platform: dlms_meter
    obis_code: "1-0:71.7.0"      # Current L3 (raw in mA)
    id: raw_current_l3
    internal: true

  # --- Power Quality ---
  - platform: dlms_meter
    obis_code: "1-0:13.7.0"      # Power factor (raw ×1000)
    id: raw_power_factor
    internal: true

  - platform: dlms_meter
    obis_code: "1-0:14.7.0"      # Grid frequency
    id: raw_frequency
    internal: true


  # ============================================================
  # CALIBRATED TEMPLATE SENSORS
  # These are the sensors visible in Home Assistant.
  # Scaling is applied here from the raw values above.
  # ============================================================

  # --- Active Power ---
  - platform: template
    name: "Grid Power Import"
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    lambda: return id(raw_power_import).state;

  - platform: template
    name: "Grid Power Export"
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    lambda: return id(raw_power_export).state;

  # --- Active Energy Totals (use these in HA Energy Dashboard) ---
  - platform: template
    name: "Grid Energy Import Total"
    unit_of_measurement: kWh
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3
    lambda: return id(raw_energy_import).state * 0.001;   # Wh → kWh

  - platform: template
    name: "Grid Energy Export Total"
    unit_of_measurement: kWh
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3
    lambda: return id(raw_energy_export).state * 0.001;   # Wh → kWh

  # --- Reactive Power ---
  - platform: template
    name: "Reactive Power Import"
    unit_of_measurement: VAr
    device_class: reactive_power
    state_class: measurement
    accuracy_decimals: 1
    lambda: return id(raw_reactive_import).state * 0.001;  # mVAr → VAr

  - platform: template
    name: "Reactive Power Export"
    unit_of_measurement: VAr
    device_class: reactive_power
    state_class: measurement
    accuracy_decimals: 1
    lambda: return id(raw_reactive_export).state * 0.001;  # mVAr → VAr

  # --- Reactive Energy Totals ---
  - platform: template
    name: "Reactive Energy Import Total"
    unit_of_measurement: kVArh
    device_class: reactive_energy
    state_class: total_increasing
    accuracy_decimals: 3
    lambda: return id(raw_reactive_energy_import).state * 0.001;  # VArh → kVArh

  - platform: template
    name: "Reactive Energy Export Total"
    unit_of_measurement: kVArh
    device_class: reactive_energy
    state_class: total_increasing
    accuracy_decimals: 3
    lambda: return id(raw_reactive_energy_export).state * 0.001;  # VArh → kVArh

  # --- Phase L1 (present on all installations) ---
  - platform: template
    name: "Voltage L1"
    unit_of_measurement: V
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    lambda: return id(raw_voltage_l1).state;

  - platform: template
    name: "Current L1"
    unit_of_measurement: A
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    lambda: return id(raw_current_l1).state * 0.01;  # mA → A

  # --- Phase L2 (three phase only) ---
  - platform: template
    name: "Voltage L2"
    unit_of_measurement: V
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    lambda: return id(raw_voltage_l2).state;

  - platform: template
    name: "Current L2"
    unit_of_measurement: A
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    lambda: return id(raw_current_l2).state * 0.01;  # mA → A

  # --- Phase L3 (three phase only) ---
  - platform: template
    name: "Voltage L3"
    unit_of_measurement: V
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    lambda: return id(raw_voltage_l3).state;

  - platform: template
    name: "Current L3"
    unit_of_measurement: A
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    lambda: return id(raw_current_l3).state * 0.01;  # mA → A

  # --- Power Quality ---
  - platform: template
    name: "Power Factor"
    unit_of_measurement: ""
    device_class: power_factor
    state_class: measurement
    accuracy_decimals: 3
    lambda: return id(raw_power_factor).state * 0.001;  # ×1000 → dimensionless

  - platform: template
    name: "Frequency"
    unit_of_measurement: Hz
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 2
    lambda: return id(raw_frequency).state;
