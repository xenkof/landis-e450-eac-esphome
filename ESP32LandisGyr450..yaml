esphome:
  name: landis-meter
  friendly_name: Landis+Gyr E450

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

# ============================================================
# REQUIRED: Fix for Cyprus E450 HDLC frame format
# Remove this block once PR #16942 is merged into ESPHome
# https://github.com/esphome/esphome/pull/16942
# ============================================================
external_components:
  - source: github://pr#16942
    components: [dlms_meter]
    refresh: 1s

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  fast_connect: true

api:
  encryption:
    key: !secret landis_api_encryption_key

ota:
  - platform: esphome

# ============================================================
# M-Bus UART Configuration
# TX/RX pins are swapped relative to standard convention
# M-Bus module: VCC=5V, GND, TXD→GPIO16, RXD→GPIO17
# ============================================================
uart:
  id: mbus_uart
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 2400
  rx_buffer_size: 2048
  data_bits: 8
  parity: NONE
  stop_bits: 1

dlms_meter:
  uart_id: mbus_uart

sensor:
  # ============================================================
  # RAW DLMS SENSORS
  # These read directly from the meter via OBIS codes.
  # Marked internal=true so they don't appear in Home Assistant.
  # Scaling is applied in the template sensors below.
  #
  # Scaling factors for this meter (EAC Cyprus E450):
  #   Energy:         raw value in Wh  → multiply 0.001 → kWh
  #   Current:        raw value in mA  → multiply 0.01  → A
  #   Power Factor:   raw value ×1000  → multiply 0.001 → dimensionless
  #   Reactive Power: raw value in mW  → multiply 0.001 → VAr
  #   Power/Voltage/Frequency: no scaling needed
  # ============================================================

  - platform: dlms_meter
    obis_code: "1-0:1.7.0"   # Instantaneous active power import
    id: raw_power_import
    internal: true

  - platform: dlms_meter
    obis_code: "1-0:2.7.0"   # Instantaneous active power export
    id: raw_power_export
    internal: true

  - platform: dlms_meter
    obis_code: "1-0:1.8.0"   # Cumulative energy import (Wh)
    id: raw_energy_import
    internal: true

  - platform: dlms_meter
    obis_code: "1-0:2.8.0"   # Cumulative energy export (Wh)
    id: raw_energy_export
    internal: true

  - platform: dlms_meter
    obis_code: "1-0:4.7.0"   # Instantaneous reactive power export
    id: raw_reactive_export
    internal: true

  - platform: dlms_meter
    obis_code: "1-0:32.7.0"  # Instantaneous voltage L1
    id: raw_voltage_l1
    internal: true

  - platform: dlms_meter
    obis_code: "1-0:31.7.0"  # Instantaneous current L1 (raw in mA)
    id: raw_current_l1
    internal: true

  - platform: dlms_meter
    obis_code: "1-0:13.7.0"  # Power factor (raw ×1000)
    id: raw_power_factor
    internal: true

  - platform: dlms_meter
    obis_code: "1-0:14.7.0"  # Grid frequency
    id: raw_frequency
    internal: true

  # ============================================================
  # CALIBRATED TEMPLATE SENSORS
  # These are the sensors visible in Home Assistant.
  # Scaling is applied here from the raw values above.
  # ============================================================

  - platform: template
    name: "Grid Power Import"
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    lambda: return id(raw_power_import).state;

  - platform: template
    name: "Grid Power Export"
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    lambda: return id(raw_power_export).state;

  - platform: template
    name: "Grid Energy Import Total"
    unit_of_measurement: kWh
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3
    lambda: return id(raw_energy_import).state * 0.001;  # Wh → kWh

  - platform: template
    name: "Grid Energy Export Total"
    unit_of_measurement: kWh
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3
    lambda: return id(raw_energy_export).state * 0.001;  # Wh → kWh

  - platform: template
    name: "Reactive Power Export"
    unit_of_measurement: VAr
    device_class: reactive_power
    state_class: measurement
    accuracy_decimals: 1
    lambda: return id(raw_reactive_export).state * 0.001;  # mVAr → VAr

  - platform: template
    name: "Voltage L1"
    unit_of_measurement: V
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    lambda: return id(raw_voltage_l1).state;

  - platform: template
    name: "Current L1"
    unit_of_measurement: A
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    lambda: return id(raw_current_l1).state * 0.01;  # mA → A

  - platform: template
    name: "Power Factor"
    unit_of_measurement: ""
    device_class: power_factor
    state_class: measurement
    accuracy_decimals: 3
    lambda: return id(raw_power_factor).state * 0.001;  # ×1000 → dimensionless

  - platform: template
    name: "Frequency"
    unit_of_measurement: Hz
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 2
    lambda: return id(raw_frequency).state;